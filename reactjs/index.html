<!DOCTYPE html>
<html lang="en" ng-app="meuApp">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReactJS</title>
</head>

<body>

    <div id="root"></div>
    
    <!-- REACTJS (LIB) -> /BIBLIOTECA/MODULO/PACOTE -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    

    <script>

        const { useState } = React

        function App() {
            const [cor, setCor] = useState("black")
            const [title, setTitle] = useState("Mudando texto e a cor")

            function mudarCor() {
                if (cor === "black") {
                    setTitle("Mudando texto e a cor")
                    setCor("red")
                } else {
                    setTitle("Mudar o texto e a cor aqui")
                    setCor("black")
                }
            }

            return React.createElement("div", null,
                React.createElement("h1", null, "Estou em ReactJS"),
                React.createElement("h3", { style: { color: cor } }, title),
                React.createElement("button", { onClick: mudarCor }, "Mudar cor"),
            )
        }

        ReactDOM.createRoot(document.getElementById("root")).render(
            React.createElement(App)
        )

    </script>
</body>

</html>
