<body>
    <h1>Estou em JqueryJS</h1>
    <h3>Mudando texto e a cor</h3>
    <button>Mudar cor</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <script>

        $("button").on("click", () => {
            console.log("ss", ($("h3").css("color")))
            if ($("h3").css("color") === "rgb(0, 0, 0)") {
                $("h3").text("Mudando texto e a cor")
                $("h3").css("color", "rgb(255, 0, 0)")
            } else {
                $("h3").text("Texto foi modificado")
                $("h3").css("color", "rgb(0, 0, 0)")
            }
        })
